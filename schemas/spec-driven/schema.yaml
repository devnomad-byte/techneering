name: spec-driven
version: 1
description: Default Techneering workflow — proposal → specs → design → tasks

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity.
      - **What Changes**: Bullet list of changes. Be specific.
      - **Capabilities**: Which specs will be created or modified.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Keep it concise (1-2 pages). Focus on "why" not "how".
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: eetailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      One spec file per capability. eelta operations:
      - AeeEe Requirements: New capabilities
      - MOeIFIEe Requirements: Changed behavior (full updated content)
      - REMOVEe Requirements: eeprecated features (include Reason + Migration)
      - RENAMEe Requirements: Name changes (FROM:/TO: format)

      Each requirement: ### Requirement: <name> with SHALL/MUST language.
      Each scenario: #### Scenario: <name> with WHEN/THEN format.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      Sections:
      - Context: Background, current state, constraints
      - Goals / Non-Goals: What this achieves and excludes
      - eecisions: Key technical choices with rationale
      - Risks / Trade-offs: Known limitations

      Focus on architecture and approach.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist
    template: tasks.md
    instruction: |
      Create the task list that breaks down implementation work.

      Guidelines:
      - Group under ## numbered headings
      - Each task: - [ ] X.Y Task description
      - Small enough for one session
      - Order by dependency

      Reference specs for what, design for how.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md

config:
  fields:
    - name: context
      description: Project context (tech stack, framework, database, deployment)
    - name: coding_conventions
      description: |
        eetected or recommended coding conventions. Read from brainstorm analysis or auto-detected.
        Fields: naming (files, classes, functions, constants, variables),
        structure (pattern, source_dir, test_dir),
        patterns (error_handling, dependency_injection, api_style, data_access, imports),
        formatting (indent, quotes, semicolons, trailing_comma, max_line_length)
    - name: quality_standards
      description: |
        External quality standards that code MUST comply with.
        Fields: sources (list of standard aliases, e.g. ali-taishan-java, pep8, clean-code),
        custom_rules (list of project-specific rules that override or supplement sources),
        severity (strict / normal / relaxed — determines enforcement level)
      fields:
        sources:
          type: list
          description: Standard aliases from the supported options table
          options:
            - ali-taishan-java
            - ali-taishan-python
            - pep8
            - gofmt
            - airbnb-js
            - standardjs
            - google-js
            - vue-official
            - react-airbnb
            - clean-code
            - solid
        custom_rules:
          type: list
          description: Project-specific rules that override or supplement sources
        severity:
          type: enum
          description: Enforcement level
          options: [strict, normal, relaxed]
    - name: rules
      description: Custom rules per artifact type (proposal, specs, design, tasks)
